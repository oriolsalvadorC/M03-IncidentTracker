name: CI - Security Audit RBAC

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codi
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instal·lar dependències Python
        run: |
          pip install -r requirements.txt

      - name: Instal·lar Firefox i Geckodriver
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox
          wget -q https://github.com/mozilla/geckodriver/releases/download/v0.36.0/geckodriver-v0.36.0-linux64.tar.gz
          tar -xzf geckodriver-v0.36.0-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/

      - name: Executar tests de seguretat Selenium
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MOZ_HEADLESS: 1
        run: |
          python manage.py test core.tests_selenium --verbosity=2
